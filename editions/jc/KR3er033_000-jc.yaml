木香丁香各二錢半上為細末酒糊丸如桐子大空心溫酒下三五十丸大效若楝丸治奔豚小腹痛神效川苦楝茴香附子一兩炮去皮臍上三味酒二升煮盡為度焙乾研細末每秤藥末一兩入玄胡半兩全蠍十八個炒丁香十八個別為末和勻酒糊丸桐子大溫酒下五十丸空心痛甚加當歸煎酒下治喉閉逡巡不救方皂莢去皮子生半兩為細末箸頭點少許在痛處更以醋糊調藥末厚塗項上須臾便破血出立瘥極濟換骨丹海云自汗者不宜服歌曰槐皮芎術芷仙人防首蔓十味各停勻苦味香減半龍麝即少許硃砂作衣纏麻黃膏煎丸大少如指彈上治半身不遂口眼喎斜手足不仁言語謇澀或痛入骨髓或痹襲皮膚或中急風涎潮不語精神昏塞行止艱難筋脈拘急左癱右瘓一切風疾並皆治之槐莢子生人參桑白皮蒼朮川芎何首烏蔓荊子葳靈仙防風各二兩五味子香附子苦參各一兩香白芷二兩麝香二錢另研上一十四味為細未入香令勻又用麻黃十斤去節根用大河水三石三斗熬至六斗濾過去滓再熬至二升半入銀石器內熬成膏入前藥末和勻杵三五千下每一兩作十丸硃砂為衣每服一丸先搗碎酒一盞自晨浸至晚食後臨臥攪勻服之神清無睡是藥之驗須臾隔五日服之如中風無汗宜服若體虛自汗服之是重亡津液也風盛人於密室溫臥取汗三焦熱用藥大例方在元戎上焦清神散連翹防風湯涼膈散龍腦飲子犀角地黃湯中焦小承氣湯調胃承氣湯洗心散四順清涼飲桃仁承氣湯下焦大承氣湯五芩散八正散石葦散抵當湯丸氣分熱柴胡飲子白虎湯血分熱清涼飲子桃仁承氣湯通治大熱三黃丸黃連解毒湯三焦寒用藥大例方在衛生上焦桂附丸銕刷湯胡椒理中丸中焦二氣丸附子理中丸一大建中下焦還少丹八味丸大真丹氣分寒桂枝加附子湯桂枝加芍藥人參新加湯血分寒巴戟丸神珠丹通治大寒大巳寒丸四逆湯以上內有寒熱之大略也若外有寒熱當求別法發癍諸藥葛根橘皮湯癍在肌治傷寒暴發肌中癍爛咳而心悶但嘔清汁宜此葛根橘皮杏仁知母黃芩麻黃甘草分銼每用五錢水煎陽毒升麻湯癍在面治傷寒一二日或吐下後變成陽毒腰背痛煩悶不安面赤狂言見鬼下痢脈浮大數咽喉痛下膿血五日可治七日難愈升麻半兩犀角射干黃芩人參甘草各三錢半上㕮咀水三升煎取半飲一盞刻許再服溫覆手足汗出解否則重作陽毒玄參升麻湯癍在身治汗下吐後毒不散表虛里實熱發於外甚則煩躁譫語兼治喉痹腫痛玄參升麻甘草各半分上細銼水煎陽毒梔子湯少陽陽明合病治陽毒傷寒壯熱百節疼痛升麻梔子仁黃芩芍藥石膏知母甘草杏仁柴胡上粗末五錢生薑五片豆豉百粒水煎消毒犀角飲子治癍牛蒡子六兩荊芥三兩防風三兩甘草一兩水煎服陰毒升麻鱉甲湯大建中湯尤妙升麻三兩當歸甘草各二兩蜀椒一兩去汗鱉甲炙雄黃半兩研上為細末每服半兩水煎蒸病治者宜隨各經虛實內外淺深用藥加減可也古今錄驗五蒸湯甘草一兩炙茯苓三兩人參二兩竹葉二兩乾地黃葛根各三兩知母黃芩各二兩石膏五兩碎粳米二合上十味㕮咀以水九升煮取二升半分為三服亦可以先煮小麥水乃煮藥忌海藻菘菜蕪荑大醋實熱黃芩黃連黃柏大黃虛熱氣也烏梅秦艽柴胡血也青蒿鱉甲蛤蚧小麥牡丹皮肺鼻乾烏梅天門冬麥門冬紫菀皮舌白唾血石膏桑白皮膚昏味嗜睡牡丹皮氣遍身氣熱喘促鼻乾人參黃芩梔子大腸鼻右孤干痛大黃芒硝脈唾白浪語脈絡溢脈緩急不調生地黃當歸心舌乾黃連生地黃血發焦地黃當歸桂心童子小便小腸下唇焦赤茯苓木通生地黃脾唇焦芍藥木瓜苦參肉食無味而嘔煩躁不安芍藥胃舌下痛石膏粳米大黃芒硝葛根肝眼黑川芎當歸前胡筋甲焦川芎當歸膽眼白失色柴胡栝蔞三焦乍熱乍寒石膏竹葉腎兩耳焦生地黃石膏知母寒水石腦頭眩悶熱地黃防風羌活髓髓沸骨中熱天門冬當歸地黃骨齒黑腰痛足逆變疳食減鱉甲地骨皮牡丹皮當歸生地黃肉肢細跌腫府藏俱石膏黃柏胞小便赤黃澤瀉茯苓生地黃沉香滑石膀胱左耳焦澤瀉茯苓滑石凡此諸蒸皆熱病後食肉油膩房酒犯之而成久蒸不除變成疳病即死矣葛根散治陽毒身熱如火頭痛躁渴咽喉干痛葛根銼七錢半黃芩大黃醋炒甘草山梔子仁朴硝各半兩上為末水煎活人敗毒散太陽證治傷寒溫疫風溫風眩風痰痹溫羌活獨活前胡柴胡枳殼人參茯苓桔梗甘草川芎分兩隨病加減上為細末生薑水煎或沸湯亦可大人小兒皆宜瘴煙之地溫疫時行或人多風痰或處卑濕腳氣此藥不可缺一方少加薄荷同煎三陽頭痛羌活防風荊芥升麻葛根白芷柴胡川芎芍藥細辛蔥白連須分兩旋加若陰證頭痛只用溫中藥足矣乃理中姜附之類也發黃兼諸雜證治法在前難知內附陰黃治法在後陰證略例內附小便不利者煩躁而渴加茯苓豬苓滑石當歸官桂煩躁喘嘔不渴加黃苓白朮半夏生薑茯苓四肢遍身冷者加附子甘草茵陳蒿湯加減肢體逆冷腰上自汗加附子乾薑甘草身冷不止者加附子乾薑前藥末已脈尚伏加吳茱萸附子乾薑木通當歸韓氏立名為茵陳茯苓湯茵陳橘皮湯小茵陳湯茵陳四逆湯茵陳附子湯茵陳茱萸湯大抵只是仲景陰證藥內加茵陳也用者要當識之掌中金丸治婦人乾血氣穿山甲炮甘草苦丁香川椒苦葶藶白附子草烏頭豬牙皂角各一錢芭豆一錢全用研上共為細末生蔥絞汁和丸彈子大每用一丸新綿包定納陰中一日即白二日即赤三日即血神效龍腦雞蘇丸上焦熱除煩解勞去肺熱咳嗽心熱驚悸脾胃熱口甘吐血肝膽熱泣出口苦腎熱神志不定上而酒毒膈熱消渴下而血滯五淋血崩等疾薄荷一斤麥門冬去心一兩甘草一兩半生乾地黃六兩各為末黃耆新蒲黃阿膠炒黃連人參木通各一兩柴胡二兩銼同木通沸湯半升浸一日夜紋取汁上為細末好蜜二斤先煉一二沸然後下生地黃末不住手攪時加木通柴胡汁浸熬成膏勿令火緊焦了然後將前藥末和丸如豌豆大每服二十丸白湯下虛勞煩熱梔子湯下肺熱黃芩湯下心熱悸動恍惚人參湯下唾咯吐衄四血去心麥門冬湯下脾胃熱赤芍藥生甘草湯下肝熱防風湯下腎熱黃柏湯下治五淋及婦人漏下車前子湯下痰嗽者生薑湯下莖中痛者蒲黃滑石末一錢調下氣逆者橘皮湯下室女虛勞寒熱潮作煎柴胡人參湯下以上並食後臨臥服黃耆膏子煎丸治證同前人參白朮各一兩半柴胡黃芩各一兩白芷知母甘草炙各半兩鱉甲一個半大者酥炙上為細末黃耆膏子丸桐子大每服三五十丸百沸湯空心下上用黃耆半斤粗末水二斗熬一半梔去滓再熬令不住攪成膏至鬥斤入白蜜一兩餳一兩再熬令蜜餳熟得膏十兩放令丸藥地骨皮枳殼散治骨蒸壯熱肌肉消瘦少力多困夜多盜汗地骨秦艽柴胡枳殼知母當歸鱉甲醋炙黃上等分為末水一盞桃枝柳頭各七個姜三片烏梅一個每服去滓臨臥服易簡芎歸湯治一切去血過多眩暈悶絕傷胎去血產後去血崩中去血拔牙去血金瘡去血不止者舉頭欲倒悉能治之川芎當歸各等汾上㕮咀水煎熱服若產後眩暈加芍藥產後腹疼不可忍加官桂酒童便合煎妊娠子死或不死胎動酒水合煎即下未死者即安若虛損腹痛少氣頭眩自汗每服加羊肉一兩生薑十片水煎若臨月服之則縮胎易產若室女婦人心腹㽲痛經脈不調水煎服若妊娠胎氣不安產後諸疾酒水煎服若難生倒橫子死腹中先用黑豆一大合炒熟水與小便合煎服若難產用百草霜香白芷等分童子小便好醋各一合沸湯煎服甚者再服已分娩矣若腸風藏毒每服加槐花末五分三日取下血塊即愈若吐血亦宜服此若血氣上喘下腫空心煎艾湯調下若產後惡血注心迷悶喘急腹痛依前用黑豆加生薑自汁然煎服若產後頭痛加荊芥若崩中漏下失血不止加香附子炒每兩入甘草一錢沸湯點服若有白帶者加芍藥半兩乾薑等分米飲湯調下三奇六神麯法白虎白曲一百斤青龍青蒿自然汁三升勾陳蒼耳汁二升騰蛇野蓼子汁四升玄武杏仁四升去皮尖看面乾溼用水朱雀赤小豆三升煮沸去湯研上和一處拌勻稍干為妙用大盆罨一宿子伏內至寅日踏極實為度甲寅戊寅庚寅乃三奇也臥鋪如曲法千金種子法進火之時當至陰節間而止不爾則過一宮矣予問故師曰深則少陰之分肅殺之方何以生化淺則厥陰之分融和之方故能發生所以受胎之處在淺而不在深也非月經後皆不可用事惟經後一日男二日女三日男此之外皆不成胎也大風大雨大寒大暑陰晦日月蝕皆不可交接所生男女癡聾喑啞四體不完矣搐鼻香治子宮冷起白帶下牡蠣煆紫梢花龍腦母丁香黃狗頭骨煆蛇床子破故紙桂心各等分上等細末煉蜜丸如雞頭大臨事用一粒聖世無補堯舜施濟之功往往泫愧此書一出使黃童白叟悉免顛連擬之救急仙方斯真無愧非特余所深幸古人亦無湮沒之憾矣是為序光緒丙子春仲德清俞樾撰
