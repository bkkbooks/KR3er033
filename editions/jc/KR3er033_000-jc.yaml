body:
  text: 傷寒不可汗不可下不可吐諸證大發春宜吐夏宜汗秋宜下凡用藥汗及吐下湯劑皆中病即止若少陽病脈微不可發汗亡陽故也宜附子湯若陽已虛尺中弱澀者復不可下之宜小柴胡湯若動氣在左在右在上在下並不可發汗宜柴胡桂枝湯若少陰病脈細沉數病在裡不可發汗宜當歸四逆湯若少陽病不可發汗宜小柴胡湯若咽中閉塞咽喉乾燥亡血衄家淋家瘡家不可發汗以上六證並宜小柴胡湯若下利清穀不可發汗宜理中湯四逆湯之類若四逆厥及虛家皆不可吐厥者宜當歸四逆湯虛宜附子湯有熱人宜黃耆人參建中湯本虛攻其熱必噦宜小柴胡湯若少陰膈上寒乾嘔不可吐宜小半夏加橘皮湯溫中丸若咽中有動氣不可下咽中閉塞不可下宜烏扇湯若外實者不可下諸四逆厥者不可下虛家亦然厥宜當歸四逆湯虛者宜附子湯有熱宜黃耆人參建中湯若脈浮而緊法當身疼痛宜以汗解假令尺中遲者不可發汗榮氣不足血少故也宜小柴胡湯若脈濡而緊濡則衛氣弱緊則榮中寒陽微衛中風發熱而惡寒榮緊衛氣冷微嘔心內煩此不可汗宜小柴胡湯若濡而弱不可發汗宜小柴胡湯若浮而大浮為氣實大而血虛小便當赤而難胞中當虛今反小便利而大汗出法應衛家微可與小建中湯若反更實津液四射榮竭血盡干煩而不得眠此不可下宜與小柴胡湯若脈浮大應發汗宜柴胡桂枝湯若脈浮而緊者不可下而反下之為大逆宜桂枝麻黃各半湯若脈數不可下宜柴胡桂枝湯或下之必煩利不止宜葛根黃芩黃連湯若脈澀弱浮數不可下宜小柴胡湯若濡弱微澀微則陽氣不足中風汗出而反躁煩澀則無血厥而且寒不可下宜桂枝甘草牡蠣龍骨湯若結胸脈浮大不可下下之即死宜小陷胸湯若陽病多者熱下之則硬宜小柴胡湯若太陽發汗不徹轉屬陽明微汗出不惡寒若太陽證不罷不可下之下之為逆宜桂枝麻黃湯若太陽病有外證未解不可下下之為逆宜桂枝麻黃湯若病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞結胸則有陷胸湯丸三痞則有瀉心湯五若太陽與陽明合病喘而胸滿不可下宜麻黃杏子甘草石膏湯若太陽與少陽合病心下硬頸項強而眩者不可下宜小柴胡湯若病欲吐者不可下宜小半夏加橘皮湯太陰腹痛吐食自利腹痛下之必胸下結硬厥陰病暍氣上衝心心中熱飢不欲食食則吐蛔下之則利不止若少陰病飲食入口則吐心中溫溫欲吐腹痛能吐始得之手足寒脈弦遲者此胸中寒食不可下也宜溫中湯生薑汁半夏湯若無陽陰強大便硬者下之必清穀腹滿宜用蜜煎導法若傷寒五六日不結胸腹濡脈虛復厥者不可下此亡血也宜當歸四逆湯下之則死宜四逆湯加人參湯若藏結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也謂下也宜用小柴胡湯若傷寒嘔多雖有陽明證不可攻之宜小柴胡湯若陽明病身面色赤攻之必發熱宜調胃承氣湯若色黃者小便不利也宜五苓散若陽明病心下硬滿者不可攻之宜生薑瀉心湯半夏瀉心湯攻之利不止者死宜四逆湯不可汗下吐三法利害非輕前人多列經後大抵醫之失止在先藥藥之錯則變生若汗下不瘥則永無亡陽生黃蓄血結胸痞氣及下痢洞泄脅熱痢痙急勞等證生矣其如此故錄大禁忌於前使醫者當疾之初不犯也太陽證桂枝二十四方麻黃五方在後保命集內傷寒六經所感形證合用汗下吐和解等湯丸仲景活人云岐子保命集載之詳者此不復重錄數書中所無者並諸方對證加減今載於後金匱黃耆建中湯治虛勞裡急諸不足宜此方主之黃耆桂枝生薑切各二兩芍藥六兩炙甘草二兩膠飴一升大棗十二個劈上七味㕮咀以水七升先煮六味取三升去滓納膠飴令消溫服一升日三若嘔者加桂姜若腹滿者去棗加茯苓四兩若肺虛損不足痞氣加半夏五兩易簡建中加減法若婦人血疼男子心腹㽲痛並四肢拘急疼痛甚者加遠志半兩若或吐或瀉狀如霍亂及胃涉濕寒賊風入腹拘急切痛加附子七錢半若疝氣發作當於附子建中湯煎時加蜜一匙頭許若男子婦人諸虛不足小腹急痛脅肋䐜脹下虛滿胸中煩悸面色痿黃唇口乾燥少力身重短氣腰背強痛骨肉痠疼行動喘乏不能飲食或因勞傷過度或因病後不復加黃耆一兩半若婦人一切血氣虛損及產後勞傷虛羸不足腹中㽲痛吸吺少氣小腹拘急痛引腰背時自汗出不思飲食加當歸一兩名當歸建中湯產後半月每日三服令人精壯大建中湯治內虛里急少氣手足厥逆少腹攣急或腹滿弦急不能食起即微汗出陰縮或腹中寒痛不堪勞苦唇口舌乾精自出或手足作寒作熱而煩苦酸責不能當立此補中益氣桂心三錢芍藥黃耆各三錢甘草炙當歸人參各一錢生薑五錢附子五分半夏二錢半大棗二枚上㕮咀水五盞煮至三盞去滓分三服易簡杏子湯治咳咳不問外感風寒內傷生冷及虛勞咯血痰飲停積悉皆治療人參半夏茯苓細辛減半甘草炙官桂減半乾薑減半芍藥五味子上㕮咀每服四錢水一盞半杏仁去皮尖銼五枚姜五片煮至六分去滓服若感冒得之加麻黃等分若脾胃素實者用罌粟殼去筋膜碎銼以醋淹炒等分加之每服加烏梅一枚煮服其效尤驗嘔逆噁心者不可用此若久年咳嗽氣虛喘急去杏仁人參倍加麻黃添芍藥如麻黃之數乾麻五味子各增一半名小青龍湯大補十全散參耆朮茯草芍地桂歸川三五錢秤用生薑棗水煎婦人虛弱用名美號十全治男子婦人諸虛不足五勞七傷不進飲食久病虛損時發潮熱氣攻骨瘠拘急疼痛夜夢遺精面色痿黃腳膝無力喘咳中滿脾腎氣弱五心煩悶並皆治之肉桂芍藥甘草黃耆當歸川芎人參白朮茯苓熟地黃各等分上為粗末每服二大錢水一盞生薑三片棗二枚煎至七分不拘時候溫服桂芍藥甘草小建中湯也黃耆與此三物即黃耆建中湯也人參茯苓白朮甘草四君子湯也川芎芍藥當歸四物湯也以其氣血俱衰陰陽並弱天得地之成數故名曰十全散易簡胃風湯治大人小兒風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血日夜無度人參茯苓川芎官桂當歸芍藥白朮各等分上㕮咀每服二錢水一大盞粟米百餘粒同煎七分去滓稍熱服空心小兒量力減之若加熟地黃黃耆甘草等分足為十味名十補湯若虛勞嗽加五味子若有痰加半夏若發熱加柴胡若有汗加牡蠣若虛寒加附子若寒甚加乾薑皆依本方等分若骨蒸發熱飲食自若者用十補湯加柴胡二兩服之若氣短加人參若小便不利加茯苓若脈弦澀加川芎若惡寒加官桂若脈澀加當歸若腹痛加白芍藥若胃熱濕盛加白朮若血瘀色紫者陳血也加熟地黃若血鮮色紅者新血也加生地黃若寒熱者加柴胡若肌熱者加地骨皮若脈洪實痛甚者加酒浸大黃潔古云防風為上使黃連為中使地榆為下使千里漿一名水胡蘆木瓜紫蘇葉官桂各半兩烏梅肉赤茯苓各一兩上為細末煉蜜為丸如彈子大噙化一丸咽津又方百藥煎烏梅肉紫蘇葉人參甘草麥冬上各等分為細末煉蜜丸噙化荔枝湯烏梅肉甘草各三錢百藥煎一兩白芷半兩白檀三錢上為細末湯點蜜酒好蜜二斤水一碗細曲一斤半好乾酵三兩上先熬蜜水去花沫令絕冷下曲酵每日三攪三日熟陽明證葛根湯三方升麻湯大小青龍等湯在後保命集內承氣湯三方亦在易老門冬飲子治老弱虛人大暍人參枸杞白茯苓甘草各二錢五味子麥門冬去心各半兩上為粗末生薑煎麥門冬飲治勞復欲死人氣欲絕者用之有效麥門冬一兩甘草二錢尖粳米半合上門冬去心為細末水二盞煎粳米令熟去米約湯一小盞半入藥五錢七棗二枚去核新竹葉十五片同煎至一大盞去滓大溫服不能服者綿滴口中後人治小兒不能灌注者宜用此綿滴法此方不用石膏以其三焦無大熱也兼自欲死之人陽氣欲絕者故不用石膏若加人參大妙海藏五飲湯一留飲心下二澼飲脅下三痰飲胃中四溢飲膈上五流飲腸間凡此五飲酒後傷寒飲冷過多故有此疾旋覆花人參陳皮枳實白朮茯苓厚朴半夏澤瀉豬苓前胡桂心芍藥甘草上等分銼每兩分四服水二盞生薑十片同煎至七分取清溫飲無時忌食肉生冷滋味等物因酒有飲加葛根花縮砂仁海藏已寒丸此丸不僣上陽生於下治陰證服四逆輩胸中發燥而渴者或數日大便秘小便澀赤服此丸上不躁大小便自利肉桂茯苓各半兩良薑烏頭炮各七錢附子炮乾薑炮芍藥茴香炒各一兩上等分為細末糊為丸桐子大溫酒下空腹食前五七十丸八九十丸亦得酒醋為糊俱可婦人血風證因大脫血崩漏或前後血因而枯燥其熱不除循衣撮空摸床閉目不省擲手揚視搖動不寧錯語失神脈弦浮而虛內燥熱之極也氣粗鼻乾而不潤上下通燥此為難治宜生地黃黃連湯主之川芎生地黃當歸各七錢赤芍藥梔子黃連黃芩各三錢防風三兩上為粗末每服三錢水二盞煎至七分取清飲無時徐徐與之若脈實者加大黃下之大承氣湯氣藥也自外而之內者用之生地黃黃連湯血藥也自內而之外者用之氣血合病循衣撮空證同自氣而之血血而復之氣大承氣湯下之自血而之氣氣而復之血地黃黃連湯主之也二者俱不大便增損理中丸王朝奉云大小陷胸湯丸不愈者宜與之人參白朮栝蔞牡蠣各二兩甘草炒三兩乾薑炮一兩半枳實炮二十四個黃芩去枯一兩上為細末煉蜜為丸如彈子大湯盞煎服不歇復與之不過五六胸中豁然矣用藥神速未嘗見也渴者加栝蔞根汗者加牡蠣少陽證大少柴胡湯加減在前附子柴胡五方在後保命集內易簡參蘇飲治感冒發熱頭痛與痰飲凝積發而為熱並宜服之若感冒發熱亦如服養胃湯法連進數服微汗即愈大治中脘痞悶嘔逆噁心開胃進食小兒室女尤宜服之前胡人參紫蘇乾葛半夏茯苓加三分枳殼陳皮甘草桔梗木香各五錢上㕮咀每服四錢水一盞半生薑七片棗一枚煎至六分去滓不以時候素有痰飲者俟退熱以二陳湯或六君子湯間服若男子婦人虛勞發熱或吐衄下血過多致虛熱者用此藥三兩加四物湯二兩合和名茯苓補心湯活人治婦人傷寒妊娠服藥例若發熱惡寒者不離桂枝芍藥若往來寒熱者不離柴胡前胡若大渴者不離知母石膏五味子麥門冬若大便泄者不離桂附白朮乾薑若大便燥結者不離大黃黃芩若經水適來適去斷者不離小柴胡若安胎者不離人參附膠白朮黃芩若發汗者不離蔥豉生薑麻黃旋覆若頭痛者不離前胡石膏梔子若傷暑頭痛者不離柴胡石膏甘草若滿悶者不離枳實陳皮若腦氣不安者不離黃芩麥門冬人參若癍發黑者不離黃芩梔子升麻萬病紫菀丸療臍腹久患痃癖如碗大及諸黃病每地氣起時上氣衝心繞臍絞痛一切蟲咬十種水病十種蟲病反胃吐食嘔逆噁心飲食不消天行時病婦人多年月露不通或腹如懷孕多血天陰即發又治十二種風頑痹不知年歲晝夜不安夢與鬼交頭白多屑或哭或笑如鬼魅所著腹中生瘡腹痛服之皆效紫菀去苗上吳茱萸湯洗七次焙乾菖蒲柴胡去須厚朴薑製一兩桔梗去蘆茯苓去皮皂莢去皮子等炙桂枝乾薑炮黃連去八錢蜀椒去目及開口微炒去汗巴豆去皮製出油研人參去蘆各一錢川烏去皮臍三錢加羌活獨活防風各五錢上為細末入巴豆勻煉蜜丸如桐子大每服三丸漸加至五七丸生薑湯送下食後臨蓐初有孕者不宜服其引於後痔漏腸風酒下赤白痢歌子湯下膿血痢米飲湯下墜傷血悶四肢不收酒下蛔蟲咬心檳檳榔湯下氣噎憂噎荷葉湯下打撲傷損酒下中毒帚灰甘草湯下一切風升麻湯下寸白蟲檳榔湯下霍亂乾薑湯下咳嗽杏仁湯下腰腎痛豆淋湯下陰毒傷寒溫酒下吐逆生薑湯下食飲氣塊麵湯下時氣井花水下脾風陳皮湯下頭痛水下心痛溫酒下大小便不通燈草湯下因物所傷以本物湯下吐水藜湯下氣病乾薑湯下小兒天風吊搐防己湯下防風亦可小兒疳痢蔥白湯下小兒乳食傷白湯下月信不通煎紅花酒下婦人腹痛川芎湯下懷孕半年後胎漏艾湯下有子氣衝心酒下產暈痛溫酒下血氣痛當歸酒下產後心痛脹滿豆淋湯下難產益志湯下產後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死菜子湯下又治小兒驚癇大人癲狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟等疾太陰證陷胸三方瀉心五方在後保命集內理市湯加減例若為寒氣濕氣所中者加附子一兩名附子理中湯若霍亂吐瀉者加橘紅青橘各一兩名治中湯若干霍亂心腹作痛先以鹽湯少許頓服候吐出令透即進此藥若嘔吐者於治中湯內加丁香半夏一兩每服生薑十片同煎若泄瀉者加橘紅茯苓各一兩名補中湯若溏泄不已者於補中湯內加附子一兩不喜飲水穀不化者再加縮砂仁一兩共成八味若霍亂吐下心腹作痛手足逆冷於本方中去白朮加熟附名四順湯若傷寒結胸先以桔梗枳殼等分煎服不愈者及諸吐利後胸痞欲絕心膈高起急痛手不可近者加枳實茯苓各一兩名枳實理中湯若渴者再於枳實理中湯內加栝蔞根一兩若霍亂後轉筋者理中湯內加火煆石膏一兩若臍上築者腎氣動也去朮加官桂一兩半腎惡燥故云術恐作奔豚故加官桂若悸多者加茯苓一兩若渴欲飲水者添加朮半兩若苦寒者添加乾薑半兩若腹滿者去白朮加附子一兩若飲酒過多及啖炙爆熱食發為鼻衄加川芎一兩若傷胃吐血以此藥能理中脘分利陰陽安定血脈只用本方若中附子毒者亦用本方若止用甘草乾姜等分煎服仍以鳥豆煎湯解之平胃散加減例若瀉脾濕加茯苓丁香白朮為調胃散一法加藿香半夏若加乾薑為厚朴湯若溫疫時氣二毒傷寒頭痛壯熱加蓮鬚蔥白五寸豆豉三十粒煎二三服微汗出愈若五勞七傷腳手心熱煩躁不安百節痠痛加柴胡若痰嗽瘧疾加薑製半夏若本臟氣痛加茴香若火氣衝滿加桑白皮若婦人赤白帶下加黃耆若酒傷加丁香若飲冷傷食加高良薑若滑脫泄瀉加肉豆蔻若風痰四肢沉困加荊芥若腿膝冷痛加牛膝若渾身虛壅拘急加地骨皮若腿膝濕痹加菟絲子若白痢加吳茱萸若赤痢加黃連若頭風加藁本若轉筋霍亂加楠木皮若七邪六極耳鳴夢泄盜汗四肢沉重腿膝酸痿婦人宮藏久冷月脈不調者加肉桂若胃寒嘔吐多加生薑一法加茯苓丁香各三兩共成六味若氣不舒快中脘痞塞加縮砂仁香附子各三兩生薑煎服若與五苓散相半為對金飲子若與六一散相合為黃白散若與錢氏異功散相合為調胃散若欲進食加神麯麥芽吳茱萸蜀椒乾薑桂為吳茱萸湯若加藁本桔梗為和解散治傷寒吐利若加藿香半夏為金不換正氣散若瘧疾寒熱者加柴胡若小腸氣痛者加苦楝茴香少陰證真武四逆等湯在活人姜附方七道在保命集內八物定志丸補益心神安定魂魄治痰去胸中邪熱理肺腎人參一兩半菖蒲遠志去心茯神去心茯苓去皮各一兩硃砂一錢白朮麥門冬去心各五錢牛黃二錢另研細上為細末煉蜜丸桐子大米飲湯下三十丸無時若髓竭不足加生地黃當歸若肺氣不足加天冬麥門冬五味子若心氣不足加上黨參茯神菖蒲若脾氣不足加白朮白芍藥益志若肝氣不足加天麻川芎若腎氣不足加熟地黃遠志牡丹皮若膽氣不足加細辛酸棗仁地榆若神昏不足硃砂預知子茯神仲景八味丸熟地黃補腎水真血肉桂補腎水真火牡丹皮補神志不足附子能行諸經而不止兼益火白茯苓能伐腎邪濕滯澤瀉去胞中留垢及遺溺山茱萸治精滑不禁乾山藥能治毛中燥酸澀上八味皆君主之藥若不依易老加減服之終不得效若加五味子為腎氣丸述類象形之劑也益火之源以消陰翳壯水之主以制陽光錢氏地黃丸減桂附潔古老人天麻丸治證見活法機要天麻六兩酒浸三日焙乾秤除風痹牛膝六兩酒浸三日焙乾秤強筋玄參六兩樞機管領萆薢六兩另為末壯骨杜仲六兩挫炒去須使筋骨相著當歸十兩全用和養血羌活十或十五兩去骨節間風生地黃一斤益真血附子一兩炮行諸經不止獨活五兩去腎間風邪上為細末煉蜜為丸如桐子大每服五七十丸病大至百丸空心食前溫酒白湯下服藥忌壅塞宜於通利故服半月稍覺壅塞微以七宣丸輕疏之使藥再為用也大效牡丹皮散治血藏虛風及頭目不利不思飲食手足煩熱肢節拘急疼痛胸膈不利大腸不調陰陽相干心驚忪悸或時旋運牡丹皮川芎枳殼麩炒各一兩陳皮炙玄胡甘草羌活半夏湯洗三稜制乾薑炮肉桂各半兩木香柯子肉白朮炒各三分芍藥三錢當歸一兩半上為細末每服二錢水一盞半煎五七沸食前溫服益血海退血風勞攻注消寒痰實痹胃理血氣攻刺及氣虛惡寒潮熱證至妙海藏大五補丸同三才丸例天門冬麥門冬菖蒲茯神人參益志枸杞地骨皮遠志熟地黃上為末煉蜜丸如桐子大空心酒下三十丸本方數服以七宣丸泄之清心丸治熱黃柏二兩生天門冬一兩黃連半兩龍腦一錢麥門冬去心一兩上為細末煉蜜丸如桐子大每服十丸臨臥門冬酒下薄荷湯亦得火府丹丙丁俱瀉黃芩黃連一生地黃二木通三上研末煉蜜丸桐子大每服二三十丸臨臥溫水下海藏調胃白朮澤瀉散治痰病化為水氣傳變水鼓不能食白朮澤瀉芍藥陳皮茯苓生薑木香檳榔上為末一法加白朮本藥各半治腹臍上腫如神若心下痞