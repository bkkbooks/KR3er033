front:
  text: 序序治疔之法向無專書南渡時有救急仙方皆載瘍醫之術所論疔瘡甚詳惜原本與作者姓名並佚天祿秘鈔不可得而窺也無專書遂無專家鄉曲逆旅之人倉卒肉墳未及延醫誤犯口戒每不治即有能治之者未得竅要雖有明堂秘傳安能扶危於頃刻間哉吳門張君蓉亭遊於浙得鈔本於慈谿應氏繼於他處得刻本二種參考異同原其本皆按經循絡遂刪繁就簡合為一書前舉要言各穴繪以總圖治法編成歌訣附以膏方名曰治疔捷法王君緘三患指疔蓉亭為之治病若失索其書亦不秘王君以之療人輒效繼增以考正穴法願付手民以廣其傳而求序於余余向不精歧黃之術嘗讀素問諸書間有疑焉輒為通其說顧以舊史退居田裡生逢
